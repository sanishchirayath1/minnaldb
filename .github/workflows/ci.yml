name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build better-sqlite3 native binding
        working-directory: packages/core/node_modules/better-sqlite3
        run: npx --yes node-gyp rebuild --release

      - run: pnpm --filter minnaldb --filter minnaldb-react --filter minnaldb-electron build

      - run: pnpm --filter minnaldb test

      - run: pnpm --filter minnaldb --filter minnaldb-react --filter minnaldb-electron typecheck
